name: Build Tongpin Clean

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  server:
    name: Test server
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/server/package-lock.json
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Build and test server
        run: npm test

  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2
      - name: Build debug APK
        run: gradle -p apps/android assembleDebug --no-daemon --console=plain
      - uses: actions/upload-artifact@v4
        with:
          name: tongpin-clean-1.2.0-apk
          path: apps/android/app/build/outputs/apk/debug/app-debug.apk
